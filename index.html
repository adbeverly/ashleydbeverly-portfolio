<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ashleydbeverly.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="terminal-wrap">
    <div id="terminal">

      <div id="titlebar">
        <div class="dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <span id="titlebar-text">ashleydbeverly.dev — terminal</span>
      </div>

      <div id="terminal-body">
        <div id="output"></div>
        <div id="input-line">
          <span class="prompt-sym">&gt;&nbsp;</span>
          <span id="display-text"></span><span id="cursor">█</span>
          <input
            id="cmd-input"
            type="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            aria-label="terminal input"
          />
        </div>
      </div>

    </div>

    <footer id="site-footer">
      <span>// &copy; 2026 Ashley D. Beverly. All rights reserved.</span>
      <span>// this site logs approximate visit location, weather, and chat interactions. no personal data stored.</span>
      <span>// no cookies. no tracking. no ads. just clean code.</span>
    </footer>

  </div>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
